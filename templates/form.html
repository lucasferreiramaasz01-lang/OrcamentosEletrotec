<!DOCTYPE html>
<html>
<head>
    <title>Nova Proposta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Nova Proposta Comercial</h2>
    <form method="post" enctype="multipart/form-data">
        <input class="form-control mb-2" name="nome" placeholder="Nome do cliente" required>
        <input class="form-control mb-2" name="endereco" placeholder="Endereço" required>
        <input class="form-control mb-2" name="tipo" placeholder="Tipo de equipamento" required>
        <input class="form-control mb-2" name="tamanho" placeholder="Tamanho" required>
        <input class="form-control mb-2" name="cor" placeholder="Cor" required>
        <textarea class="form-control mb-2" name="descricao" placeholder="Descrição"></textarea>
        <input class="form-control mb-2" name="valor" placeholder="Valor" required>
        <input class="form-control mb-2" name="pagamento" placeholder="Condições de pagamento" required>
        <input class="form-control mb-2" type="date" name="instalacao" required>
        <input class="form-control mb-3" type="file" name="imagem" accept=".jpg,.jpeg,.png,.heic" required>
        <button class="btn btn-success w-100">Gerar PDF</button>
    </form>
</div>
</body>
</html>
